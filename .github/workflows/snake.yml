name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to `output` branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/snake
          mv dist/github-contribution-grid-snake.svg      /tmp/snake/
          mv dist/github-contribution-grid-snake-dark.svg /tmp/snake/

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin output; then
            git fetch origin output
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mv /tmp/snake/github-contribution-grid-snake.svg      .
          mv /tmp/snake/github-contribution-grid-snake-dark.svg .
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(snake): refresh contribution snake [skip ci]"
          git push origin output
